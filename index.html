<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- REGISTER -->
    <div class="card" id="registerSection">
        <h2>Tengeneza Account</h2>


        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPassword" placeholder="Password">

        <button onclick="register()">Register</button>

        <p>Already have an account?
            <a href="#" onclick="showLogin()">Login</a>
        </p>
    </div>

    <!-- LOGIN -->
    <div class="card hidden" id="loginSection">
        <h2>Login</h2>

        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">

        <button onclick="login()">Login</button>

        <p>huna account?
            <a href="#" onclick="showRegister()">Register</a>
        </p>
    </div>

    <!-- APPLICATION FORM -->
    <div class="card hidden" id="formSection">

        <h2>Job Application Form</h2>

        <input type="text" id="name"  placeholder="Jina la Kwanza">
        <input type="text" id="name2"  placeholder="Jina la Pili">
        <input type="text" id="name3" placeholder="Jina la Tatu">

        <input type="tel" id="phone"  placeholder="Phone Number">

        <label>Birth Date</label>
        <input type="date" id="borthday">

        <label>Jinsia</label>
        <select id="gender">
            <option>Chagua Jinsia</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <input type="number" id="age" placeholder="Miaka">

        <input type="email" id="email" placeholder="Email">

        <label>Upload Photo</label>
        <input type="file" accept="image/*">

        <label>Kiwango cha Elimu</label>
        <select id="education">
            <option>Chagua Elimu</option>
            <option>Primary</option>
            <option>Secondary</option>
            <option>Certificate</option>
            <option>Diploma</option>
            <option>Bachelor Degree</option>
            <option>Master Degree</option>
            <option>PhD</option>
        </select>

<button type="button" class="submit-btn" 
	onclick="registerUser()">
            Tuma Maombi
        </button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="script.js"></script>

</body>
</html>
